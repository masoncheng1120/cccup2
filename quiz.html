<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="quizSelection.pageTitle">Quiz Selection — Cheng Chung Cup</title>
  <!-- Import professional and tech-oriented fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #070912;
      --bg-deep: #1D2042;
      --accent-yellow: #FAD948;
      --accent-hover: #e5c436;
      --text-light: #f8fafc;
      --text-dark: #1D2042;
      --muted: #94a3b8;
      --card-bg: rgba(29, 32, 66, 0.4);
      --card-border: rgba(250, 217, 72, 0.2);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-dark);
      /* Animated Mesh Gradient Background */
      background: radial-gradient(circle at 20% 20%, #1a1e3d 0%, transparent 40%),
                  radial-gradient(circle at 80% 80%, #0d1122 0%, transparent 40%),
                  linear-gradient(135deg, #070912 0%, #1D2042 100%);
      color: var(--text-light);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Background decorative elements */
    .bg-glow {
      position: absolute;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, rgba(250, 217, 72, 0.05) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .menu {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 4rem 2rem;
      max-width: 800px;
      width: 92%;
    }

    .title {
      margin: 0 0 4rem 0; /* Increased margin since subtitle is removed */
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 4px;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--accent-yellow);
      text-shadow: 0 0 20px rgba(250, 217, 72, 0.4), 0 0 40px rgba(250, 217, 72, 0.1);
    }

    .buttons {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-container {
      position: relative;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-container:hover {
      transform: scale(1.05);
    }

    .btn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      width: 220px;
      height: 180px;
      border-radius: 20px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    /* Tech-card style for buttons */
    .btn-primary { 
      background: rgba(250, 217, 72, 0.08);
      color: var(--accent-yellow);
      border: 1px solid var(--accent-yellow);
      box-shadow: inset 0 0 15px rgba(250, 217, 72, 0.1);
    }

    .btn-primary:hover {
      background: var(--accent-yellow);
      color: var(--bg-dark);
      box-shadow: 0 0 30px rgba(250, 217, 72, 0.4);
    }

    .btn svg {
      width: 48px;
      height: 48px;
      transition: transform 0.3s ease;
    }

    .btn:hover svg {
      transform: scale(1.2) rotate(5deg);
    }

    .btn-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
    }

    .btn-outline { 
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 4rem;
      padding: 0.75rem 1.5rem;
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 30px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .btn-outline:hover {
      color: #fff;
      border-color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    /* Decorative corner accents */
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid var(--accent-yellow);
      opacity: 0.5;
    }
    .top-left { top: 0; left: 0; border-right: 0; border-bottom: 0; }
    .bottom-right { bottom: 0; right: 0; border-left: 0; border-top: 0; }

    @media (max-width: 600px) {
      .btn { width: 100%; height: auto; padding: 2rem; flex-direction: row; }
      .buttons { flex-direction: column; width: 100%; }
      .bg-glow { width: 80vw; height: 80vw; }
      .title { margin-bottom: 2rem; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  
  <main class="menu">
    <div style="position: relative; display: inline-block;">
      <div class="corner top-left"></div>
      <div class="corner bottom-right"></div>
      <h1 class="title" style="padding: 1rem 2rem;" data-i18n="quizSelection.title">Quiz Portal</h1>
      <div class="btn-container">
        <a class="btn btn-primary" href="potential_kinetic.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
          </svg>
          <span class="btn-label" data-i18n="quizSelection.potentialKinetic">Potential & Kinetic</span>
        </a>
      </div>
      
      <div class="btn-container">
        <a class="btn btn-primary" href="friction.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
          <span class="btn-label" data-i18n="quizSelection.frictionPhysics">Friction Physics</span>
        </a>
      </div>
    </div>

    <div>
      <a class="btn btn-outline" href="index.html" data-i18n="quizSelection.returnToMain">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"/>
        </svg>
        Return to Main Menu
      </a>
    </div>
  </main>

  <script src="i18n.js" defer></script>
</body>
</html>
